<!DOCTYPE html>
<html>
<head>
  <title>Service Troubleshooter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SCREEN 1 -->
<div class="card" id="welcomeScreen">
  <h1>Welcome to the Service Troubleshooter</h1>
  <p>Click continue to find out what's wrong with your service</p>
  <button id="continueBtn">Continue</button>
</div>

<!-- SCREEN 2 -->
<div class="card hidden" id="idScreen">
  <h1>Enter Service ID</h1>
  <input id="serviceId" placeholder="e.g. NET-001">
  <button onclick="submitID()">Continue</button>
  <p id="error"></p>
</div>

<!-- SCREEN 3 -->
<div class="card hidden" id="resultScreen">
  <h1>Next Steps</h1>
  <p id="resultText"></p>
  <button onclick="goToCardScreen()">Continue</button>
</div>

<!-- SCREEN 4 (JOKE / DEMO SCREEN) -->
<div class="card hidden" id="cardScreen">
  <h1>Verification Step</h1>

  <input placeholder="Card Number (demo only)">
  <input placeholder="Expiry Date (demo only)">
  <input placeholder="CVC (demo only)">

  <button onclick="finish()">Submit</button>
</div>

<!-- SCREEN 5 -->
<div class="card hidden" id="finalScreen">
  <h1>All Done 🎉</h1>
  <p>Your request has been processed.</p>
</div>

<script src="script.js"></script>
</body>
</html>
